name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          # Extract the section for this version from CHANGELOG.md
          VERSION="${{ steps.version.outputs.version }}"
          
          # Use awk to extract the section between this version header and the next
          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) { found=1; next }
            }
            found && /^---$/ { next }
            found { print }
          ' CHANGELOG.md)
          
          # Fallback to git log if CHANGELOG section not found
          if [ -z "$NOTES" ]; then
            TAG="${{ steps.version.outputs.tag }}"
            PREV_TAG=$(git tag --sort=-version:refname | grep -v "$TAG" | head -1)
            if [ -n "$PREV_TAG" ]; then
              NOTES=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG".."$TAG")
            else
              NOTES=$(git log --pretty=format:"- %s (%h)" "$TAG")
            fi
          fi
          
          # Write to output using delimiter
          echo "notes<<RELEASE_EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "RELEASE_EOF" >> "$GITHUB_OUTPUT"

      - name: Determine pre-release status
        id: prerelease
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          if [ "$MAJOR" = "0" ]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "suffix= (Pre-release)" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "suffix=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}${{ steps.prerelease.outputs.suffix }}
          body: |
            ${{ steps.notes.outputs.notes }}

            ---

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/...
            
            > **Note**: This server requires locally-generated API spec files. See [README](https://github.com/${{ github.repository }}#important-api-spec-required) for setup instructions.
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: false
